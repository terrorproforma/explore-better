name: Windows CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      EXPLORE_BETTER_DISABLE_STATE_WATCH: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-go@v6
        with:
          go-version: 1.23.4
          cache-dependency-path: native/fshelper/go.mod
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build:native-helper
      - run: npm run build:renderer
      - run: npm run build:mcp-server
      - run: npm run verify:security-boundary
      - run: npm run verify:transactional-operations
      - run: npm run verify:native-helper
      - run: npm run verify:terminal
      - run: npm run verify:mcp-value
      - run: npm run verify:seo-discovery
      - run: npm run verify:layout
